name: "Publish Helm Chart"
description: "Push Helm Charts"
inputs:
  VERSION:
    description: "The version for the workflow run"
    required: true

  TAG:
    description: "The tag for the workflow run"
    required: false
    default: ""

  HELM_REGISTRY:
    description: "The chart repository to push the chart"
    required: true
  
  CONTAINER_REGISTRY_URL: 
    description: "Base registry URL"
    required: false
    default: ""

  RELEASE_BRANCH:
    description: Release branch to push changes
    required: false
    default: main

  OPM_VERSION:
    description: OPM CLI version to use
    default: "v1.50.0"
    required: false

  LATEST_TAG_NAME:
    description: "Optional rolling tag re-pointed at the freshly pushed chart (e.g. develop, latest). Leave empty to disable."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.12.3

    - name: Build and push chart
      run: make helm-release
      shell: bash
      env:
        VERSION: ${{ inputs.VERSION }}
        GIT_TAG: ${{ inputs.TAG }}
        HELM_REGISTRY: ${{ inputs.HELM_REGISTRY }}
        DOCKER_REPO_BASE: ${{ inputs.CONTAINER_REGISTRY_URL }}

    - name: Set up ORAS
      if: ${{ inputs.LATEST_TAG_NAME != '' }}
      uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

    - name: Re-point rolling tag at chart
      if: ${{ inputs.LATEST_TAG_NAME != '' }}
      shell: bash
      run: |
        # Add the rolling tag to the existing chart manifest so it shares the
        # exact digest of the versioned tag (oras tag does not re-wrap).
        CHART=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')
        oras tag \
          ${{ inputs.HELM_REGISTRY }}/$CHART:${{ inputs.VERSION }}${{ inputs.TAG }} \
          ${{ inputs.LATEST_TAG_NAME }}
