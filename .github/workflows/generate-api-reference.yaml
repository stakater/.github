name: Generate API Reference

on:
  workflow_call:
    inputs:
      operator_repo:
        type: string
        required: true
      operator_ref:
        type: string
        required: false
        default: "main"
      api_path:
        type: string
        required: true
      config_file:
        type: string
        required: false
        default: "crd-ref-docs.yaml"
      output_file:
        type: string
        required: false
        default: "content/reference/api.md"
      crd_ref_docs_version:
        type: string
        required: false
        default: "v0.3.0"
      go_version:
        type: string
        required: false
        default: "1.26"
      pr_branch:
        type: string
        required: false
        default: "chore/regenerate-api-reference"
      ENABLE_STAKATER_AB_GIT_AUTH:
        description: "Configure git to clone stakater-ab private repos"
        required: false
        default: false
        type: boolean
    secrets:
      PR_TOKEN:
        required: true
      STAKATER_AB_REPOS:
        description: "GitHub token with access to stakater-ab repos"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Configure private repo
        if: ${{ inputs.ENABLE_STAKATER_AB_GIT_AUTH }}
        run: |
          git config --global url."https://${{ secrets.STAKATER_AB_REPOS }}:x-oauth-basic@github.com/stakater-ab".insteadOf "https://github.com/stakater-ab"

      - name: Generate CRD API reference
        uses: stakater/.github/.github/actions/generate-crd-api-reference@feat/api-gen-workflow
        with:
          operator_repo: ${{ inputs.operator_repo }}
          operator_ref: ${{ inputs.operator_ref }}
          api_path: ${{ inputs.api_path }}
          config_file: ${{ inputs.config_file }}
          output_file: ${{ inputs.output_file }}
          crd_ref_docs_version: ${{ inputs.crd_ref_docs_version }}
          go_version: ${{ inputs.go_version }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          OUTPUT_FILE: ${{ inputs.output_file }}
          OPERATOR_REPO: ${{ inputs.operator_repo }}
          OPERATOR_REF: ${{ inputs.operator_ref }}
          PR_BRANCH: ${{ inputs.pr_branch }}
        run: |
          set -euo pipefail
          # No diff -> nothing to PR.
          if git diff --quiet -- "$OUTPUT_FILE"; then
            echo "No changes in $OUTPUT_FILE; skipping PR."
            exit 0
          fi
          git config user.name "stakater-github-bot"
          git config user.email "github-bot@stakater.com"
          git checkout -B "$PR_BRANCH"
          git add "$OUTPUT_FILE"
          git commit -m "docs: regenerate API reference ($OPERATOR_REF)"
          git push --force-with-lease origin "$PR_BRANCH"
          # Create the PR only if one isn't already open for this branch.
          if [ -z "$(gh pr list --head "$PR_BRANCH" --state open --json number -q '.[].number')" ]; then
            gh pr create \
              --title "docs: regenerate API reference" \
              --body "Regenerated \`$OUTPUT_FILE\` from \`$OPERATOR_REPO@$OPERATOR_REF\`." \
              --head "$PR_BRANCH"
          fi
