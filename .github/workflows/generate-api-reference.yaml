name: Generate API Reference

# Runs in the OPERATOR repo's context: reads the operator's own Go types locally
# (no cross-repo clone of private operator code), renders the API reference, and
# opens a PR in the docs repo. The only cross-repo access needed is WRITE to the
# docs repo, via DOCS_TOKEN.

on:
  workflow_call:
    inputs:
      docs_repo:
        description: "Docs repository to write the reference into (owner/name)."
        type: string
        required: true
      docs_ref:
        description: "Docs repo ref to base the PR on."
        type: string
        required: false
        default: "main"
      source_path:
        description: "Path in THIS (operator) repo to the API types (e.g. api/group/v1alpha1)."
        type: string
        required: true
      config_file:
        description: "Path in THIS (operator) repo to crd-ref-docs.yaml."
        type: string
        required: false
        default: "crd-ref-docs.yaml"
      output_file:
        description: "Path in the DOCS repo to write the generated markdown."
        type: string
        required: false
        default: "content/reference/api.md"
      crd_ref_docs_version:
        type: string
        required: false
        default: "v0.3.0"
      go_version:
        type: string
        required: false
        default: "1.26"
      pr_branch:
        type: string
        required: false
        default: "chore/regenerate-api-reference"
    secrets:
      DOCS_TOKEN:
        description: "Token with write access to the docs repo (checkout + PR)."
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operator repo
        uses: actions/checkout@v5

      - name: Checkout docs repo
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.docs_repo }}
          ref: ${{ inputs.docs_ref }}
          token: ${{ secrets.DOCS_TOKEN }}
          path: docs-repo

      - name: Generate CRD API reference
        uses: stakater/.github/.github/actions/generate-crd-api-reference@feat/api-gen-workflow
        with:
          source_path: ${{ inputs.source_path }}
          config_file: ${{ inputs.config_file }}
          output_file: docs-repo/${{ inputs.output_file }}
          crd_ref_docs_version: ${{ inputs.crd_ref_docs_version }}
          go_version: ${{ inputs.go_version }}

      - name: Create Pull Request
        working-directory: docs-repo
        env:
          GH_TOKEN: ${{ secrets.DOCS_TOKEN }}
          OUTPUT_FILE: ${{ inputs.output_file }}
          OPERATOR_REPO: ${{ github.repository }}
          OPERATOR_REF: ${{ github.ref_name }}
          PR_BRANCH: ${{ inputs.pr_branch }}
        run: |
          set -euo pipefail
          # No diff -> nothing to PR.
          if git diff --quiet -- "$OUTPUT_FILE"; then
            echo "No changes in $OUTPUT_FILE; skipping PR."
            exit 0
          fi
          git config user.name "stakater-github-bot"
          git config user.email "github-bot@stakater.com"
          git checkout -B "$PR_BRANCH"
          git add "$OUTPUT_FILE"
          git commit -m "docs: regenerate API reference from $OPERATOR_REPO@$OPERATOR_REF"
          git push --force-with-lease origin "$PR_BRANCH"
          # Create the PR only if one isn't already open for this branch.
          if [ -z "$(gh pr list --head "$PR_BRANCH" --state open --json number -q '.[].number')" ]; then
            gh pr create \
              --title "docs: regenerate API reference" \
              --body "Regenerated \`$OUTPUT_FILE\` from \`$OPERATOR_REPO@$OPERATOR_REF\`." \
              --head "$PR_BRANCH"
          fi
